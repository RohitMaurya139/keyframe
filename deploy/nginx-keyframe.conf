# KEYFRAME — nginx reverse proxy.  Public :80  →  Node :8080.
# Lets you serve on the standard HTTP port (and later add HTTPS via certbot)
# without running Node as root.
#
# Install:
#   sudo cp deploy/nginx-keyframe.conf /etc/nginx/sites-available/keyframe
#   sudo ln -sf /etc/nginx/sites-available/keyframe /etc/nginx/sites-enabled/keyframe
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (free, recommended once you have a domain):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    listen [::]:80;
    server_name _;                       # replace with your domain when you have one

    # Reference-video uploads go through multer — allow large bodies.
    client_max_body_size 200M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Renders are async (POST returns immediately, the UI polls), so requests
        # are short — but give headroom for slow LLM intake / large uploads.
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
