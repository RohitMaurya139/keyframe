<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Slideshow (should fail cinematic lint)</title>
<style>
  html,body{margin:0;background:#101822;}
  #root{position:relative;width:1920px;height:1080px;overflow:hidden;font-family:Arial,sans-serif;color:#fff;background:#101822;}
  .clip{position:absolute;inset:0;}
  .h{position:absolute;left:0;top:40%;width:100%;text-align:center;font-size:80px;font-weight:bold;}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
  <div id="root" class="composition" data-composition-id="vid" data-width="1920" data-height="1080" data-start="0" data-duration="12">
    <div id="s1" class="clip" data-start="0" data-duration="4" data-track-index="0" style="opacity:0;"><div class="h">The Problem</div></div>
    <div id="s2" class="clip" data-start="4" data-duration="4" data-track-index="1" style="opacity:0;"><div class="h">Our Solution</div></div>
    <div id="s3" class="clip" data-start="8" data-duration="4" data-track-index="2" style="opacity:0;"><div class="h">Sign Up Today</div></div>
  </div>
<script>
  const tl = gsap.timeline({ paused: true });
  tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 0);
  tl.to("#s1", { opacity: 0, duration: 0.5 }, 3.5);
  tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 4);
  tl.to("#s2", { opacity: 0, duration: 0.5 }, 7.5);
  tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 8);
  window.__timelines = window.__timelines || {};
  window.__timelines["vid"] = tl;
</script>
</body>
</html>
