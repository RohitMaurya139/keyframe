<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Golden flagship fixture</title>
<style>
  html,body{margin:0;background:#0A0912;}
  #root{position:relative;width:1920px;height:1080px;overflow:hidden;font-family:Inter,system-ui,sans-serif;color:#F4F1FF;
        background:radial-gradient(135% 120% at 22% 18%,#1B1440,#0A0912);container-type:size;}
  .clip{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;}
  .safe{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7.5% 5%;box-sizing:border-box;}
  .blob{position:absolute;border-radius:50%;filter:blur(34px);mix-blend-mode:screen;}
  #sun-blob{width:70cqw;height:70cqw;left:-15cqw;top:-20cqw;background:radial-gradient(circle,rgba(255,180,76,.5),transparent 70%);}
  #moon-blob{width:74cqw;height:74cqw;right:-18cqw;bottom:-22cqw;background:radial-gradient(circle,rgba(139,124,246,.5),transparent 70%);}
  .glass{background:linear-gradient(160deg,rgba(184,166,255,.14),rgba(20,15,40,.5));border:1px solid rgba(255,255,255,.12);
         border-radius:1.6cqw;box-shadow:0 2cqw 5cqw rgba(0,0,0,.45);backdrop-filter:blur(14px);padding:3cqw;}
  .glow{position:absolute;width:50cqw;height:36cqw;border-radius:50%;filter:blur(40px);mix-blend-mode:screen;opacity:0;
        background:radial-gradient(circle,rgba(255,180,76,.5),transparent 70%);}
  .h1{font-weight:800;font-size:5.2cqw;line-height:1.02;max-width:86%;text-align:center;}
  .grad{background:linear-gradient(100deg,#FFD27A,#FF8A5C 30%,#B8A6FF 70%,#8B7CF6);background-size:220% 100%;
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .word{display:inline-block;}
  #s2,#s3{perspective:1400px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
  <div id="root" class="composition" data-composition-id="vid" data-width="1920" data-height="1080" data-start="0" data-duration="12">
    <div id="ambient" class="clip" data-start="0" data-duration="12" data-track-index="0">
      <div id="sun-blob" class="blob"></div><div id="moon-blob" class="blob"></div>
    </div>
    <div id="s1" class="clip" data-start="0" data-duration="4.4" data-track-index="1" style="opacity:0;">
      <div class="glow" id="s1-glow" style="left:35%;top:30%;"></div>
      <div class="safe"><h1 class="h1"><span class="word">Every</span> <span class="word">launch</span> <span class="word grad">starts here.</span></h1></div>
    </div>
    <div id="s2" class="clip" data-start="4.4" data-duration="3.9" data-track-index="2" style="opacity:0;">
      <div class="glow" id="s2-glow" style="right:30%;top:24%;"></div>
      <div class="safe"><div class="glass" id="s2-panel"><div class="h1 grad" id="s2-num" style="font-size:7cqw;">0</div><div style="font-size:2cqw;text-align:center;">teams already shipping</div></div></div>
    </div>
    <div id="s3" class="clip" data-start="8.3" data-duration="3.7" data-track-index="3" style="opacity:0;">
      <div class="glow" id="s3-glow" style="left:50%;top:40%;margin-left:-25cqw;"></div>
      <div class="safe"><div class="glass" id="s3-card"><h1 class="h1 grad">Ship the film.</h1></div></div>
    </div>
  </div>
<script>
  const tl = gsap.timeline({ paused: true });
  const D = 12;
  // ambient micro-motion (finite repeats)
  tl.to("#sun-blob",  { xPercent: 12, yPercent: 8, scale: 1.12, duration: 6, ease: "sine.inOut", yoyo: true, repeat: Math.floor(D/6)-1 }, 0);
  tl.to("#moon-blob", { xPercent: -10, yPercent: -8, scale: 1.14, duration: 5, ease: "sine.inOut", yoyo: true, repeat: Math.floor(D/5)-1 }, 0);
  // s1 — push-in + kinetic stagger + glow
  tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0);
  tl.fromTo("#s1", { scale: 1.0 }, { scale: 1.07, duration: 4.4, ease: "sine.inOut" }, 0);
  tl.fromTo(".word", { yPercent: 110, opacity: 0, filter: "blur(8px)" }, { yPercent: 0, opacity: 1, filter: "blur(0px)", duration: 0.7, ease: "power3.out", stagger: 0.08 }, 0.2);
  tl.fromTo("#s1-glow", { opacity: 0, scale: 0.8 }, { opacity: 0.7, scale: 1, duration: 0.8 }, 0.2);
  tl.to("#s1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 4.0);
  tl.set("#s1", { opacity: 0 }, 4.4);
  // s2 — glass panel entrance + counter (reactive)
  tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 4.4);
  tl.fromTo("#s2", { scale: 1.12 }, { scale: 1.0, duration: 3.9, ease: "sine.inOut" }, 4.4);
  tl.fromTo("#s2-panel", { y: 60, rotationX: 22, opacity: 0 }, { y: 0, rotationX: 0, opacity: 1, duration: 0.7, ease: "expo.out" }, 4.5);
  tl.fromTo("#s2-glow", { opacity: 0 }, { opacity: 0.6, duration: 0.8 }, 4.5);
  const c = { v: 0 };
  tl.to(c, { v: 240, duration: 1.4, snap: { v: 1 }, ease: "power2.out", onUpdate(){ const e=document.getElementById("s2-num"); if(e) e.textContent=Math.round(c.v); } }, 4.8);
  tl.to("#s2", { opacity: 0, duration: 0.4, ease: "power2.in" }, 7.9);
  tl.set("#s2", { opacity: 0 }, 8.3);
  // s3 — 3D card entrance + gradient sweep
  tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 8.3);
  tl.fromTo("#s3-card", { rotationY: 28, z: -200, opacity: 0 }, { rotationY: 0, z: 0, opacity: 1, duration: 0.8, ease: "expo.out" }, 8.4);
  tl.fromTo("#s3-card .grad", { backgroundPosition: "120% 0" }, { backgroundPosition: "0% 0", duration: 0.9, ease: "power2.out" }, 8.9);
  tl.fromTo("#s3-glow", { opacity: 0, scale: 0.8 }, { opacity: 0.7, scale: 1, duration: 0.8 }, 8.5);
  tl.to("#s3-card", { scale: 1.04, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 9.4);
  window.__timelines = window.__timelines || {};
  window.__timelines["vid"] = tl;
</script>
</body>
</html>
