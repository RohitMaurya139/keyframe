<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixabay asset explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <div class="brand">
          <h1>Pixabay asset explorer</h1>
          <p>
            Search vectors, videos, music, and sound effects through your local API (Lightpanda + Puppeteer).
          </p>
        </div>
        <nav class="header-links">
          <a href="/api/docs" target="_blank" rel="noopener">OpenAPI docs</a>
          <a href="/health" target="_blank" rel="noopener">Health</a>
        </nav>
      </header>

      <main class="main">
        <div class="toolbar">
          <div class="tabs" role="tablist" aria-label="Asset type">
            <button type="button" class="tab active" data-category="vectors" role="tab" aria-selected="true">
              Vectors
            </button>
            <button type="button" class="tab" data-category="videos" role="tab" aria-selected="false">Videos</button>
            <button type="button" class="tab" data-category="music" role="tab" aria-selected="false">Music</button>
            <button type="button" class="tab" data-category="sound-effects" role="tab" aria-selected="false">
              Sound effects
            </button>
          </div>
          <form class="search-row" id="search-form" action="#" method="get">
            <input type="search" id="query" name="q" value="nature" placeholder="Search…" aria-label="Search query" />
            <button type="submit" id="search-btn">Search</button>
          </form>
          <div class="pager">
            <button type="button" id="prev-page" disabled>Prev</button>
            <span id="page-label">Page 1</span>
            <button type="button" id="next-page" disabled>Next</button>
          </div>
        </div>

        <div id="cf-alert" class="alert hidden" role="status"></div>
        <div id="error-box" class="error-box hidden"></div>
        <p id="empty-msg" class="empty hidden"></p>
        <p id="loading-msg" class="empty hidden">Loading…</p>
        <div id="grid" class="grid"></div>
      </main>
    </div>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet" id="sheet">
        <div class="sheet-header">
          <h2 id="sheet-title">Asset</h2>
          <button type="button" class="close-btn" id="close-sheet" aria-label="Close">×</button>
        </div>
        <p class="muted sheet-link-wrap">
          <a id="sheet-pixabay-link" href="#" target="_blank" rel="noopener">Open on Pixabay</a>
        </p>
        <div class="sheet-actions">
          <button type="button" class="primary" id="resolve-dl">Resolve download URLs</button>
          <a class="button-link primary" id="try-dl" href="#" target="_blank" rel="noopener">Try direct download</a>
        </div>
        <div id="sheet-dl-error" class="error-box hidden"></div>
        <div id="sheet-dl-info" class="hidden">
          <p class="muted" id="sheet-page-title"></p>
          <p class="muted" id="sheet-candidates-count"></p>
          <ul class="mono-list" id="sheet-candidates"></ul>
        </div>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
